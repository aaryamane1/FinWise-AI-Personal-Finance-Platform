<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f2d"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#hexGrad)"/>
  <!-- Hexagon outline -->
  <polygon points="50,12 80,28 80,62 50,78 20,62 20,28" fill="none" stroke="#00FF7F" stroke-width="3" opacity="0.3"/>
  <!-- Inner hexagon -->
  <polygon points="50,22 70,33 70,57 50,68 30,57 30,33" fill="none" stroke="#00FF7F" stroke-width="1.5" opacity="0.15"/>
  <!-- Trend / ECG pulse line -->
  <polyline points="18,50 30,50 36,30 42,68 48,50 60,50 66,38 72,56 80,50" fill="none" stroke="#00FF7F" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glowing dot at peak -->
  <circle cx="66" cy="38" r="3.5" fill="#00FF7F"/>
  <circle cx="66" cy="38" r="6" fill="#00FF7F" opacity="0.2"/>
</svg>
