<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FF7F;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00FF7F;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0A1628"/>
  <!-- Glow -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#glowGrad)"/>
  <!-- Upward bars (bar chart growth) -->
  <rect x="18" y="62" width="10" height="18" rx="3" fill="#00FF7F" opacity="0.35"/>
  <rect x="32" y="50" width="10" height="30" rx="3" fill="#00FF7F" opacity="0.55"/>
  <rect x="46" y="36" width="10" height="44" rx="3" fill="#00FF7F" opacity="0.75"/>
  <rect x="60" y="24" width="10" height="56" rx="3" fill="#00FF7F"/>
  <!-- Upward trend overlay line -->
  <polyline points="18,68 32,56 46,42 70,26" fill="none" stroke="#00FF7F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <polygon points="70,26 62,27 64,35" fill="#00FF7F"/>
  <!-- Top label dot -->
  <circle cx="70" cy="26" r="3.5" fill="#00FF7F"/>
</svg>
