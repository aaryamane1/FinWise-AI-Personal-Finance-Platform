<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF7F"/>
      <stop offset="100%" style="stop-color:#00B359"/>
    </linearGradient>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00331A" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0A1628"/>
  <!-- Shield shape -->
  <path d="M50,14 L76,24 L76,52 Q76,72 50,86 Q24,72 24,52 L24,24 Z" fill="url(#shieldBg)" filter="url(#innerShadow)"/>
  <!-- Shine overlay on shield -->
  <path d="M50,14 L76,24 L76,38 Q63,32 50,14Z" fill="white" opacity="0.08"/>
  <!-- F lettermark inside shield -->
  <rect x="38" y="30" width="5" height="34" rx="1.5" fill="#0A1628"/>
  <rect x="38" y="30" width="22" height="5" rx="1.5" fill="#0A1628"/>
  <rect x="38" y="46" width="16" height="5" rx="1.5" fill="#0A1628"/>
</svg>
