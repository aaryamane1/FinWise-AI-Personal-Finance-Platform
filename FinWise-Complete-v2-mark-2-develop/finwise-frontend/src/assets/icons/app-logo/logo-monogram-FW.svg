<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF7F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC55;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003322;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004433;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bgGrad)"/>
  <!-- F letter -->
  <rect x="20" y="22" width="5" height="42" rx="2" fill="#0A1628"/>
  <rect x="20" y="22" width="28" height="5" rx="2" fill="#0A1628"/>
  <rect x="20" y="41" width="22" height="5" rx="2" fill="#0A1628"/>
  <!-- W letter -->
  <polyline points="42,30 48,58 54,42 60,58 66,30" fill="none" stroke="#0A1628" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Subtle trend arrow at bottom right -->
  <polyline points="55,72 65,64 75,68 82,60" fill="none" stroke="#0A1628" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polygon points="82,60 77,63 79,68" fill="#0A1628" opacity="0.5"/>
</svg>
